name = "lamo-trivia-api"
main = "src/index.ts"
compatibility_date = "2024-11-06"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

[dev]
port = 8787

[durable_objects]
bindings = [
  { name = "GAME_LOBBY", class_name = "GameLobby" },
  { name = "GAME_ROOM", class_name = "GameRoom" },
  { name = "PRIVATE_GROUP", class_name = "PrivateGroup" },
  { name = "SCAVENGER_HUNT_ROOM", class_name = "ScavengerHuntRoom" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GameLobby", "GameRoom"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["PrivateGroup"]

[[migrations]]
tag = "v3"
new_sqlite_classes = ["ScavengerHuntRoom"]

[[kv_namespaces]]
binding = "TRIVIA_KV"
id = "34ed0bee812244b59410394854c16952"

[[r2_buckets]]
binding = "R2_HUNT_PHOTOS"
bucket_name = "lamo-hunt-photos"

[observability]
enabled = true

routes = [
  { pattern = "api.lamotrivia.app/*", zone_name = "lamotrivia.app" },
]

[vars]
FRONTEND_URL = "https://lamotrivia.app"
ADMIN_URL = "https://admin.lamotrivia.app"
GA_MEASUREMENT_ID = "G-804RC3BG82"


# Secret Store binding — re-enable once API token has Secret Store permissions:
