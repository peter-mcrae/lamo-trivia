name = "lamo-trivia-api"
main = "src/index.ts"
compatibility_date = "2024-11-06"
compatibility_flags = ["nodejs_compat"]

[dev]
port = 8787

[durable_objects]
bindings = [
  { name = "GAME_LOBBY", class_name = "GameLobby" },
  { name = "GAME_ROOM", class_name = "GameRoom" },
  { name = "PRIVATE_GROUP", class_name = "PrivateGroup" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GameLobby", "GameRoom"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["PrivateGroup"]

[[kv_namespaces]]
binding = "TRIVIA_KV"
id = "34ed0bee812244b59410394854c16952"

[observability]
enabled = true

[vars]
FRONTEND_URL = "https://lamotrivia.app"


# Secret Store binding — re-enable once API token has Secret Store permissions:
# [[secrets_store_secrets]]
# binding = "OPENAI_API_KEY"
# store_id = "8410593cfc3b4becb7b3ef55e1ecac8c"
# secret_name = "openAI_lamotrivia"
