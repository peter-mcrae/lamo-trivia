name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check shared
        run: npx tsc --noEmit -p packages/shared/tsconfig.json

      - name: Type check backend
        run: npx tsc --noEmit -p packages/backend/tsconfig.json

      - name: Type check frontend
        run: npx tsc --noEmit -p packages/frontend/tsconfig.app.json

      - name: Test shared
        run: npm test --workspace=packages/shared

      - name: Test backend
        run: npm test --workspace=packages/backend

      - name: Test frontend
        run: npm test --workspace=packages/frontend
